<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xkaliber Agent // Ollama</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --input-bg: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #00ff41; /* Hacker green */
            --accent-dim: #008f11;
            --border-color: #30363d;
            --code-bg: #21262d;
            --user-msg-bg: #1f6feb;
            --bot-msg-bg: #161b22;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            min-height: 0;
        }

        #sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            box-sizing: border-box;
            overflow-y: auto;
            flex-shrink: 0;
        }

        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
            min-height: 0;
        }

        h1 {
            font-size: 1.2rem;
            color: var(--accent-color);
            margin-top: 0;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            text-shadow: 0 0 5px var(--accent-dim);
        }

        label {
            font-size: 0.8rem;
            color: #8b949e;
            margin-bottom: 0.5rem;
            display: block;
        }

        select {
            width: 100%;
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.5rem;
            border-radius: 4px;
            font-family: inherit;
            margin-bottom: 1rem;
            outline: none;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        /* Model Parameters Group */
        .param-group {
            margin-bottom: 1rem;
            padding: 0 5px;
        }

        .param-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .param-row label {
            margin-bottom: 0;
            color: var(--text-color);
            font-weight: bold;
        }

        .param-val {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 0.8rem;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin-top: 5px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            margin-top: -5px;
            box-shadow: 0 0 5px var(--accent-dim);
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--border-color);
            border-radius: 2px;
        }

        input[type="range"]:focus {
            outline: none;
        }
        
        /* Control Group for Toggles */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1rem;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: var(--text-color);
            font-size: 0.9rem;
            font-weight: bold;
        }

        input[type="checkbox"] {
            appearance: none;
            width: 40px;
            height: 20px;
            background: #21262d;
            border-radius: 10px;
            position: relative;
            outline: none;
            cursor: pointer;
            border: 1px solid var(--border-color);
            margin-right: 10px;
        }

        input[type="checkbox"]::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: #8b949e;
            border-radius: 50%;
            transition: 0.3s;
        }

        input[type="checkbox"]:checked {
            background: var(--accent-dim);
            border-color: var(--accent-color);
        }

        input[type="checkbox"]:checked::after {
            left: 22px;
            background: #fff;
            box-shadow: 0 0 5px #fff;
        }
        
        .test-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: #8b949e;
            font-size: 0.7rem;
            padding: 2px 8px;
            margin-left: auto;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .test-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .clear-btn {
            background-color: transparent;
            border: 1px solid #da3633;
            color: #da3633;
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
            transition: all 0.2s;
            display: block;
            width: 100%;
        }

        .clear-btn:hover {
            background-color: #da3633;
            color: #fff;
            box-shadow: 0 0 10px #da3633;
        }

        #export-btn:hover, #import-btn:hover {
            background-color: var(--accent-dim);
            color: #fff;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-dim);
        }

        /* WhatsApp Styles */
        .wa-btn {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            transition: all 0.2s;
        }

        .wa-btn:hover {
            background-color: #128c7e;
            box-shadow: 0 0 10px #25d366;
        }

        #qr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #qr-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #qr-container img {
            width: 250px;
            height: 250px;
        }

        #qr-container p {
            color: black;
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .close-modal {
            color: white;
            margin-top: 20px;
            cursor: pointer;
            text-decoration: underline;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            margin-top: auto;
            color: #8b949e;
            padding-top: 1rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #da3633;
            margin-right: 8px;
            box-shadow: 0 0 5px #da3633;
        }

        .dot.connected {
            background-color: var(--accent-color);
            box-shadow: 0 0 5px var(--accent-color);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
            min-height: 0;
        }

        /* Custom Scrollbar */
        #messages::-webkit-scrollbar {
            width: 8px;
        }

        #messages::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        #messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        #messages::-webkit-scrollbar-thumb:hover {
            background: var(--accent-dim);
        }

        .message {
            max-width: 85%;
            padding: 0.8rem 1rem;
            border-radius: 6px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.3s ease;
            box-sizing: border-box;
        }

        .system-message {
            align-self: center;
            background-color: rgba(110, 118, 129, 0.1);
            border: 1px dashed var(--border-color);
            font-size: 0.85rem;
            color: #8b949e;
            max-width: 95%;
            width: fit-content;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--border-color);
            color: var(--text-color);
            border-left: 3px solid var(--accent-color);
            flex-shrink: 0; /* Don't squash message */
        }

        .bot-message {
            align-self: flex-start;
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            flex-shrink: 0; /* Don't squash message */
            min-width: 50px;
        }

        .bot-message strong {
            color: var(--accent-color);
        }

        .loading-pulse {
            display: inline-block;
            animation: pulse 1.5s infinite;
            color: var(--accent-color);
            font-style: italic;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .search-results-log {
            background-color: rgba(0, 255, 65, 0.05);
            border: 1px solid rgba(0, 255, 65, 0.2);
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            max-width: 85%;
            align-self: flex-start;
        }
        .search-results-log ul {
            margin: 0.5rem 0 0 0;
            padding-left: 1.5rem;
        }
        .search-results-log a {
            color: var(--accent-color);
            text-decoration: none;
        }
        .search-results-log a:hover {
            text-decoration: underline;
        }

        .agent-log {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1a1423;
            border-left: 3px solid #9d4edd;
            color: #e0aaff;
            padding: 0.5rem 0.8rem;
            margin: 0.5rem 0;
            font-size: 0.8rem;
            border-radius: 0 4px 4px 0;
            white-space: pre-wrap;
        }

        .input-area {
            padding: 1rem;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .input-controls {
            display: flex;
            gap: 0.5rem;
        }

        .attachments-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 0 5px;
        }

        .attachment-tag {
            background: rgba(157, 78, 221, 0.2);
            border: 1px solid #9d4edd;
            color: #e0aaff;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .attachment-tag .remove-attach {
            cursor: pointer;
            color: #ff4444;
            font-weight: bold;
        }

        textarea {
            flex: 1;
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.8rem;
            border-radius: 4px;
            resize: none;
            height: 50px;
            font-family: inherit;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--sidebar-bg);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 0 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 10px var(--accent-dim);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: var(--border-color);
            color: var(--border-color);
            box-shadow: none;
        }

        /* Markdown Styles within messages */
        .message pre {
            background-color: var(--code-bg);
            padding: 0.8rem;
            border-radius: 4px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }

        .message code {
            font-family: 'Courier New', Courier, monospace;
            background-color: rgba(110, 118, 129, 0.4);
            padding: 0.2em 0.4em;
            border-radius: 3px;
        }
        
        .message pre code {
            background-color: transparent;
            padding: 0;
        }

        /* Syntax Highlighting (GitHub Dark) */
        .hljs { color: #c9d1d9; background: var(--code-bg); }
        .hljs-keyword, .hljs-selector-tag, .hljs-title, .hljs-section { color: #ff7b72; }
        .hljs-string, .hljs-addition { color: #a5d6ff; }
        .hljs-comment, .hljs-quote, .hljs-meta { color: #8b949e; font-style: italic; }
        .hljs-number, .hljs-literal, .hljs-type { color: #79c0ff; }
        .hljs-built_in, .hljs-builtin-name, .hljs-variable, .hljs-attr { color: #ffa657; }
        .hljs-title.function_, .hljs-function .hljs-title { color: #d2a8ff; }
        .hljs-params { color: #c9d1d9; }
        .hljs-regexp, .hljs-symbol { color: #7ee787; }
        .hljs-deletion { color: #ffa198; background: rgba(255, 129, 130, 0.1); }
        .hljs-addition { background: rgba(63, 185, 80, 0.1); }

        /* Responsive / Mobile Adjustments for 1080x2400 */
        @media (max-width: 1080px) {
            body {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                height: auto;
                flex-direction: row;
                align-items: center;
                padding: 0.5rem;
                gap: 1rem;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            #sidebar h1 {
                margin: 0;
                font-size: 1rem;
                border: none;
                padding: 0;
            }

            #sidebar > div {
                margin: 0 !important;
            }

            /* Hide some sidebar elements on mobile to save space if needed, 
               or adjust layout */
            #model-select {
                margin-bottom: 0;
                width: auto;
                max-width: 150px;
            }
            
            .status-indicator {
                margin-left: auto; /* Push to right */
            }
            
            #messages {
                padding: 0.5rem;
            }
            
            .message {
                max-width: 95%;
            }
            
            .input-area {
                padding: 0.5rem;
            }
            
            textarea {
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1>XKALIBER AGENT</h1>
        
        <div>
            <!-- label hidden on mobile via CSS if needed, but keeping for now -->
            <select id="model-select">
                <option value="" disabled selected>Scanning...</option>
            </select>
        </div>

        <div class="param-group">
            <div class="param-row">
                <label for="temp-slider">Temperature</label>
                <span class="param-val" id="temp-val">0.7</span>
            </div>
            <input type="range" id="temp-slider" min="0.0" max="2.0" step="0.1" value="0.7">

            <div class="param-row" style="margin-top: 10px;">
                <label for="ctx-slider">Context Size (ctx)</label>
                <span class="param-val" id="ctx-val">4096</span>
            </div>
            <input type="range" id="ctx-slider" min="2048" max="131072" step="2048" value="4096">
        </div>

        <div class="control-group">
            <div class="toggle-row">
                <label class="toggle-label" for="memory-toggle">
                    <input type="checkbox" id="memory-toggle" checked>
                    PERSISTENT MEMORY <span id="memory-count-badge" style="color: var(--accent-color); font-size: 0.8rem; float: right; margin-left: 10px;">[0 MEMS]</span>
                </label>
            </div>
            <div class="toggle-row">
                <label class="toggle-label" for="tts-toggle">
                    <input type="checkbox" id="tts-toggle">
                    AUDIO UPLINK
                </label>
                <button id="test-audio-btn" class="test-btn" title="Test Audio Output">TEST</button>
            </div>
            
            <div class="toggle-row">
                <label class="toggle-label" for="netrunner-toggle">
                    <input type="checkbox" id="netrunner-toggle">
                    NETRUNNER (WEB)
                </label>
            </div>

            <div class="toggle-row" style="margin-top: 5px; border-top: 1px dashed var(--border-color); padding-top: 10px;">
                <label class="toggle-label" for="agent-toggle" style="color: #9d4edd; text-shadow: 0 0 5px rgba(157, 78, 221, 0.5);">
                    <input type="checkbox" id="agent-toggle" style="border-color: #9d4edd;">
                    AGENT (SYS-ACCESS)
                </label>
            </div>
            
            <button id="clear-btn" class="clear-btn">WIPE MEMORY</button>
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <button id="export-btn" class="clear-btn" style="border-color: var(--accent-dim); color: var(--accent-dim); flex: 1; margin-top: 0;">EXPORT</button>
                <button id="import-btn" class="clear-btn" style="border-color: var(--accent-dim); color: var(--accent-dim); flex: 1; margin-top: 0;">IMPORT</button>
            </div>
            <button id="wa-link-btn" class="wa-btn">LINK WHATSAPP</button>
            <div style="margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 10px;">
                <label for="sudo-input">SUDO OVERRIDE (PASS)</label>
                <input type="password" id="sudo-input" style="width: 100%; background: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 5px; border-radius: 4px; outline: none;" placeholder="••••••••">
            </div>
        </div>

        <div id="qr-modal">
            <div id="qr-container">
                <img id="qr-image" src="" alt="WhatsApp QR Code">
                <p>Scan with WhatsApp</p>
            </div>
            <div class="close-modal" id="close-qr">CANCEL</div>
        </div>

        <div class="spacer" style="flex:1;"></div>

        <div class="status-indicator">
            <div id="memory-indicator" style="display: none; color: #9d4edd; font-size: 0.7rem; margin-right: 10px; font-weight: bold;">[ NEURO-CORE SAVING... ]</div>
            <div id="status-dot" class="dot"></div>
            <span id="status-text">DISCONNECTED</span>
        </div>
    </div>

    <div id="main-chat">
        <div id="messages">
            <div class="message bot-message">
                <strong>SYSTEM:</strong> Ready. Select a model to begin uplink.
            </div>
        </div>

        <div class="input-area">
            <div id="attachments-bar" class="attachments-bar"></div>
            <div class="input-controls">
                <button id="attach-btn" title="Attach File" style="padding: 0 1rem; color: #9d4edd; border-color: #9d4edd;">📎</button>
                <textarea id="user-input" placeholder="Enter command..." disabled></textarea>
                <button id="send-btn" disabled>SEND</button>
                <button id="stop-btn" style="display: none; border-color: #da3633; color: #da3633;">STOP</button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
